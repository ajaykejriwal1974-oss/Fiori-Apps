# SAPUI5 tooling config for the custom freestyle app (on-premise S/4HANA target).
# Replace the placeholders marked REPLACE_WITH_* before running locally.
specVersion: "3.0"
metadata:
  name: kejriwal.sd.dispatchcorrection
type: application
configuration:
  propertiesFileSourceEncoding: UTF-8
server:
  customMiddleware:
    - name: fiori-tools-proxy
      afterMiddleware: compression
      configuration:
        ignoreCertError: false
        backend:
          - path: /sap
            url: REPLACE_WITH_ABAP_SYSTEM_URL
            client: "500"
        ui5:
          path:
            - /resources
            - /test-resources
          url: https://ui5.sap.com
    - name: fiori-tools-appreload
      afterMiddleware: compression
      configuration:
        port: 35729
        path: webapp
