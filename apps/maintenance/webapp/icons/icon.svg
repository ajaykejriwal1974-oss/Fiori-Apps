<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <!-- Full-bleed background (safe for maskable icons) -->
  <rect width="512" height="512" fill="#0a6ed1"/>
  <!-- Gear ring -->
  <g fill="none" stroke="#ffffff" stroke-width="20" opacity="0.9">
    <circle cx="256" cy="206" r="96"/>
  </g>
  <g fill="#ffffff">
    <!-- Gear teeth -->
    <g>
      <rect x="244" y="86" width="24" height="34" rx="4"/>
      <rect x="244" y="292" width="24" height="34" rx="4"/>
      <rect x="136" y="194" width="34" height="24" rx="4"/>
      <rect x="342" y="194" width="34" height="24" rx="4"/>
      <rect x="168" y="118" width="24" height="34" rx="4" transform="rotate(-45 180 135)"/>
      <rect x="320" y="118" width="24" height="34" rx="4" transform="rotate(45 332 135)"/>
      <rect x="168" y="262" width="24" height="34" rx="4" transform="rotate(45 180 279)"/>
      <rect x="320" y="262" width="24" height="34" rx="4" transform="rotate(-45 332 279)"/>
    </g>
    <circle cx="256" cy="206" r="34"/>
    <!-- Wordmark -->
    <text x="256" y="438" font-family="Arial, Helvetica, sans-serif" font-size="92"
          font-weight="700" text-anchor="middle" letter-spacing="4">PM</text>
  </g>
</svg>
